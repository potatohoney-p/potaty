name: Bug report
description: Report a reproducible problem in Potaty.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Potaty. Do not include access tokens, private source text,
        call transcripts, repository contents, or other sensitive data. Report vulnerabilities
        through the private security channel linked in the issue chooser.

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Provide a release tag or full commit SHA.
      placeholder: v0.1.0 or 0123456789abcdef...
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Prompt generation
        - Transcript import
        - Public GitHub import
        - Private GitHub App import
        - ASCII or Mermaid rendering
        - Manual editor
        - Backend or deployment
        - Documentation
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, browser and version, JDK, database mode, and deployment type when relevant.
      placeholder: Windows 11, Chrome 126, JDK 17, H2 local development
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use synthetic or redacted input only and make the steps independently reproducible.
      placeholder: |
        1. Start the H2 backend...
        2. Open the generation studio...
        3. Submit this synthetic input...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include redacted logs, screenshots, or stack traces if they help.
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Sensitive-data check
      options:
        - label: I removed secrets, personal data, private repository content, and proprietary source material.
          required: true
