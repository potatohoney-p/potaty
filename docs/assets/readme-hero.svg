<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Potaty turns source material into ASCII diagrams you can verify</title>
  <desc id="hero-desc">A calm technical field-note composition showing prompt, transcript, and GitHub sources becoming an evidence-linked ASCII architecture diagram.</desc>

  <defs>
    <pattern id="hero-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#f2efe4" stroke-opacity=".045"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" rx="24" fill="#0d100e"/>
  <rect width="1280" height="640" rx="24" fill="url(#hero-grid)"/>
  <path d="M24 56V24h32M1224 24h32v32M24 584v32h32M1224 616h32v-32" fill="none" stroke="#98aa8f" stroke-opacity=".55"/>

  <g font-family="'Samsung Sharp Sans', SamsungOne, 'Pretendard Variable', 'Noto Sans KR', sans-serif">
    <g transform="translate(72 58)">
      <rect width="42" height="42" rx="8" fill="#171c18" stroke="#98aa8f" stroke-opacity=".72"/>
      <path d="M14 9h14l6 6v18H14z" fill="none" stroke="#f2efe4" stroke-width="1.8"/>
      <path d="M28 9v6h6M18 20h11M18 25h8M18 30h11" fill="none" stroke="#f2efe4" stroke-width="1.5"/>
      <path d="M9 14v15" stroke="#98aa8f" stroke-width="1.6" stroke-dasharray="2 2"/>
      <circle cx="9" cy="10" r="1.7" fill="#98aa8f"/>
      <circle cx="9" cy="33" r="1.7" fill="#98aa8f"/>
      <text x="58" y="25" fill="#f2efe4" font-size="25" font-weight="700" letter-spacing="1.8">POTATY</text>
    </g>

    <g transform="translate(72 156)">
      <text fill="#f2efe4" font-size="49" font-weight="700" letter-spacing="-1.5">
        <tspan x="0" y="0">Turn source material</tspan>
        <tspan x="0" y="58">into ASCII you can verify.</tspan>
      </text>
      <text x="0" y="116" fill="#d8d4c8" font-size="18" font-weight="400">
        <tspan x="0" dy="0">Prompt, transcript, or repository in.</tspan>
        <tspan x="0" dy="28">Evidence-linked, editable plain text out.</tspan>
      </text>
    </g>

    <g transform="translate(72 362)" font-size="12" font-weight="700" letter-spacing="1.15">
      <rect width="104" height="38" rx="4" fill="#171c18" stroke="#98aa8f" stroke-opacity=".55"/>
      <circle cx="18" cy="19" r="4" fill="#98aa8f"/>
      <text x="31" y="23" fill="#d8d4c8">PROMPT</text>

      <g transform="translate(116)">
        <rect width="132" height="38" rx="4" fill="#171c18" stroke="#8eabb4" stroke-opacity=".55"/>
        <circle cx="18" cy="19" r="4" fill="#8eabb4"/>
        <text x="31" y="23" fill="#d8d4c8">TRANSCRIPT</text>
      </g>

      <g transform="translate(260)">
        <rect width="104" height="38" rx="4" fill="#171c18" stroke="#c87a61" stroke-opacity=".55"/>
        <circle cx="18" cy="19" r="4" fill="#c87a61"/>
        <text x="31" y="23" fill="#d8d4c8">GITHUB</text>
      </g>
    </g>

    <g transform="translate(72 458)">
      <path d="M0 0h504" stroke="#f2efe4" stroke-opacity=".14"/>
      <text y="31" fill="#98aa8f" font-size="11" font-weight="700" letter-spacing="1.5">SOURCE-GROUNDED</text>
      <text x="164" y="31" fill="#918f87" font-size="12">·</text>
      <text x="182" y="31" fill="#8eabb4" font-size="11" font-weight="700" letter-spacing="1.5">DETERMINISTIC</text>
      <text x="324" y="31" fill="#918f87" font-size="12">·</text>
      <text x="342" y="31" fill="#c87a61" font-size="11" font-weight="700" letter-spacing="1.5">OPEN SOURCE</text>
      <rect y="66" width="178" height="32" rx="16" fill="#1e241f" stroke="#c87a61" stroke-opacity=".55"/>
      <circle cx="18" cy="82" r="4" fill="#c87a61"/>
      <text x="31" y="86" fill="#d8d4c8" font-size="11" font-weight="700" letter-spacing="1.05">PRE-RELEASE PREVIEW</text>
    </g>

    <g transform="translate(664 58)">
      <rect width="544" height="524" rx="12" fill="#121613" stroke="#f2efe4" stroke-opacity=".16"/>
      <path d="M0 58h544" stroke="#f2efe4" stroke-opacity=".12"/>
      <text x="24" y="35" fill="#f2efe4" font-size="13" font-weight="700" letter-spacing="1.2">ASCII ARTIFACT</text>
      <g transform="translate(365 17)">
        <rect width="155" height="28" rx="14" fill="#1e241f" stroke="#98aa8f" stroke-opacity=".52"/>
        <circle cx="17" cy="14" r="4" fill="#98aa8f"/>
        <text x="29" y="18" fill="#b5c3ae" font-size="10" font-weight="700" letter-spacing=".8">EVIDENCE LINKED</text>
      </g>

      <g transform="translate(32 86)" font-family="'JetBrains Mono', D2Coding, Consolas, monospace" font-size="16" fill="#f2efe4" xml:space="preserve">
        <text x="0" y="0">┌──────────────┐      ┌──────────────┐</text>
        <text x="0" y="28">│   WEB APP    │─────▶│     API      │</text>
        <text x="0" y="56">└──────────────┘      └──────┬───────┘</text>
        <text x="0" y="84" fill="#918f87">                              │</text>
        <text x="0" y="112" fill="#98aa8f">                       evidence│</text>
        <text x="0" y="140" fill="#918f87">                              ▼</text>
        <text x="0" y="168">                    ┌─────────────────┐</text>
        <text x="0" y="196">                    │   JOB WORKER    │</text>
        <text x="0" y="224">                    └────────┬────────┘</text>
        <text x="0" y="252" fill="#918f87">                             │</text>
        <text x="0" y="280" fill="#8eabb4">                      persists│</text>
        <text x="0" y="308" fill="#918f87">                             ▼</text>
        <text x="0" y="336">                    [(  POSTGRES  )]</text>
      </g>

      <g transform="translate(24 454)">
        <rect width="496" height="46" rx="6" fill="#171c18" stroke="#f2efe4" stroke-opacity=".1"/>
        <circle cx="18" cy="23" r="4" fill="#98aa8f"/>
        <text x="32" y="27" fill="#b5c3ae" font-size="11" font-weight="700">claims keep evidence, confidence, and warnings</text>
        <text x="472" y="27" text-anchor="end" fill="#918f87" font-size="10" font-weight="600">PLAIN TEXT</text>
      </g>
    </g>
  </g>
</svg>
