<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="social-title social-desc">
  <title id="social-title">Potaty repository social preview</title>
  <desc id="social-desc">Potaty turns prompts, transcripts, and GitHub repositories into source-grounded ASCII diagrams.</desc>

  <rect width="1280" height="640" fill="#0d100e"/>
  <image href="github-social-preview-art.jpg" x="0" y="0" width="1280" height="640" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1280" height="640" fill="#0d100e" opacity=".08"/>
  <rect x="0" y="0" width="632" height="640" fill="#0d100e" opacity=".94"/>
  <path d="M632 0v640M664 0v640" stroke="#f2efe4" stroke-opacity=".08"/>
  <path d="M32 72V32h40M1208 32h40v40M32 568v40h40M1208 608h40v-40" fill="none" stroke="#98aa8f" stroke-opacity=".62"/>

  <g font-family="'Samsung Sharp Sans', SamsungOne, 'Pretendard Variable', 'Noto Sans KR', sans-serif">
    <g transform="translate(72 64)">
      <rect width="48" height="48" rx="9" fill="#171c18" stroke="#98aa8f" stroke-opacity=".75"/>
      <path d="M16 10h16l7 7v21H16z" fill="none" stroke="#f2efe4" stroke-width="2"/>
      <path d="M32 10v7h7M21 23h12M21 29h9M21 35h12" fill="none" stroke="#f2efe4" stroke-width="1.6"/>
      <path d="M10 16v17" stroke="#98aa8f" stroke-width="1.7" stroke-dasharray="2 2"/>
      <circle cx="10" cy="11" r="1.8" fill="#98aa8f"/>
      <circle cx="10" cy="38" r="1.8" fill="#98aa8f"/>
      <text x="66" y="30" fill="#f2efe4" font-size="30" font-weight="700" letter-spacing="2">POTATY</text>
    </g>

    <g transform="translate(72 188)">
      <text fill="#f2efe4" font-size="50" font-weight="700" letter-spacing="-1.4">
        <tspan x="0" y="0">Source in.</tspan>
        <tspan x="0" y="60">Verifiable ASCII out.</tspan>
      </text>
      <text x="0" y="119" fill="#d8d4c8" font-size="18">
        <tspan x="0" dy="0">Prompt · transcript · GitHub</tspan>
        <tspan x="0" dy="29">Evidence · confidence · editable plain text</tspan>
      </text>
    </g>

    <g transform="translate(72 438)">
      <rect width="208" height="38" rx="19" fill="#1e241f" stroke="#98aa8f" stroke-opacity=".65"/>
      <circle cx="19" cy="19" r="4" fill="#98aa8f"/>
      <text x="33" y="23" fill="#b5c3ae" font-size="11" font-weight="700" letter-spacing="1.1">OPEN-SOURCE PREVIEW</text>
      <text y="82" fill="#918f87" font-size="11" font-weight="700" letter-spacing="1.3">SOURCE-GROUNDED · DETERMINISTIC · NEVER EXECUTES IMPORTED CODE</text>
    </g>

    <g transform="translate(1012 70)">
      <rect width="196" height="36" rx="4" fill="#121613" fill-opacity=".9" stroke="#f2efe4" stroke-opacity=".28"/>
      <text x="98" y="23" text-anchor="middle" fill="#d8d4c8" font-size="10" font-weight="700" letter-spacing="1.1">ASCII BY DESIGN</text>
    </g>
  </g>
</svg>
