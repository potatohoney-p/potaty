<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="pipeline-title pipeline-desc">
  <title id="pipeline-title">Potaty source-to-diagram pipeline</title>
  <desc id="pipeline-desc">Prompt, transcript, and GitHub sources are normalized and safety scanned, assembled into canonical evidence-linked Diagram IR, laid out deterministically, and rendered as ASCII, Mermaid, or editable shapes.</desc>

  <defs>
    <pattern id="pipeline-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#f2efe4" stroke-opacity=".04"/>
    </pattern>
    <marker id="pipeline-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0l8 4-8 4z" fill="#98aa8f"/>
    </marker>
  </defs>

  <rect width="1200" height="360" rx="16" fill="#121613"/>
  <rect width="1200" height="360" rx="16" fill="url(#pipeline-grid)"/>

  <g font-family="'Samsung Sharp Sans', SamsungOne, 'Pretendard Variable', 'Noto Sans KR', sans-serif">
    <text x="32" y="35" fill="#f2efe4" font-size="13" font-weight="700" letter-spacing="1.4">ONE CANONICAL, EVIDENCE-LINKED PATH</text>
    <text x="1168" y="35" text-anchor="end" fill="#918f87" font-size="11" font-weight="600">UNTRUSTED INPUT → REVIEWABLE OUTPUT</text>

    <g transform="translate(32 70)">
      <rect width="188" height="50" rx="6" fill="#171c18" stroke="#98aa8f" stroke-opacity=".55"/>
      <circle cx="18" cy="25" r="4" fill="#98aa8f"/>
      <text x="34" y="23" fill="#f2efe4" font-size="13" font-weight="700">Prompt</text>
      <text x="34" y="39" fill="#918f87" font-size="10">text · objective</text>

      <g transform="translate(0 70)">
        <rect width="188" height="50" rx="6" fill="#171c18" stroke="#8eabb4" stroke-opacity=".55"/>
        <circle cx="18" cy="25" r="4" fill="#8eabb4"/>
        <text x="34" y="23" fill="#f2efe4" font-size="13" font-weight="700">Transcript</text>
        <text x="34" y="39" fill="#918f87" font-size="10">speaker · timestamp</text>
      </g>

      <g transform="translate(0 140)">
        <rect width="188" height="50" rx="6" fill="#171c18" stroke="#c87a61" stroke-opacity=".55"/>
        <circle cx="18" cy="25" r="4" fill="#c87a61"/>
        <text x="34" y="23" fill="#f2efe4" font-size="13" font-weight="700">GitHub</text>
        <text x="34" y="39" fill="#918f87" font-size="10">read-only text snapshot</text>
      </g>
    </g>

    <path d="M220 95h34v70h24M220 165h58M220 235h34v-70h24" fill="none" stroke="#98aa8f" stroke-width="1.5" stroke-opacity=".8" marker-end="url(#pipeline-arrow)"/>

    <g transform="translate(280 110)">
      <rect width="188" height="110" rx="8" fill="#171c18" stroke="#f2efe4" stroke-opacity=".18"/>
      <text x="18" y="30" fill="#f2efe4" font-size="14" font-weight="700">Normalize &amp; ingest</text>
      <text x="18" y="55" fill="#98aa8f" font-size="11" font-weight="600">redact · bound · chunk</text>
      <path d="M18 72h152" stroke="#f2efe4" stroke-opacity=".1"/>
      <text x="18" y="93" fill="#918f87" font-size="10">atomic · idempotent · tenant scoped</text>
    </g>

    <path d="M468 165h46" stroke="#98aa8f" stroke-width="1.5" marker-end="url(#pipeline-arrow)"/>

    <g transform="translate(520 90)">
      <rect width="208" height="150" rx="8" fill="#1e241f" stroke="#98aa8f" stroke-opacity=".72"/>
      <text x="20" y="32" fill="#f2efe4" font-size="15" font-weight="700">Canonical Diagram IR</text>
      <path d="M20 49h168" stroke="#98aa8f" stroke-opacity=".3"/>
      <circle cx="25" cy="72" r="4" fill="#98aa8f"/>
      <text x="38" y="76" fill="#d8d4c8" font-size="11">entities &amp; relations</text>
      <circle cx="25" cy="99" r="4" fill="#8eabb4"/>
      <text x="38" y="103" fill="#d8d4c8" font-size="11">evidence &amp; confidence</text>
      <circle cx="25" cy="126" r="4" fill="#c87a61"/>
      <text x="38" y="130" fill="#d8d4c8" font-size="11">warnings &amp; versions</text>
    </g>

    <g transform="translate(537 267)">
      <rect width="174" height="38" rx="4" fill="#171c18" stroke="#8eabb4" stroke-opacity=".42" stroke-dasharray="4 4"/>
      <text x="87" y="24" text-anchor="middle" fill="#918f87" font-size="10" font-weight="700">OPTIONAL LLM ENRICHMENT</text>
      <path d="M87 0V-21" stroke="#8eabb4" stroke-opacity=".65" stroke-dasharray="4 4"/>
    </g>

    <path d="M728 165h46" stroke="#98aa8f" stroke-width="1.5" marker-end="url(#pipeline-arrow)"/>

    <g transform="translate(780 110)">
      <rect width="164" height="110" rx="8" fill="#171c18" stroke="#f2efe4" stroke-opacity=".18"/>
      <text x="18" y="31" fill="#f2efe4" font-size="14" font-weight="700">Layout &amp; validate</text>
      <text x="18" y="57" fill="#98aa8f" font-size="11" font-weight="600">deterministic</text>
      <text x="18" y="80" fill="#d8d4c8" font-size="10">coverage · geometry</text>
      <text x="18" y="96" fill="#918f87" font-size="10">publishability report</text>
    </g>

    <path d="M944 165h34v-70h18M944 165h52M944 165h34v70h18" fill="none" stroke="#98aa8f" stroke-width="1.5" stroke-opacity=".8" marker-end="url(#pipeline-arrow)"/>

    <g transform="translate(1000 70)">
      <rect width="168" height="50" rx="6" fill="#171c18" stroke="#98aa8f" stroke-opacity=".55"/>
      <text x="18" y="22" fill="#f2efe4" font-family="'JetBrains Mono', D2Coding, Consolas, monospace" font-size="13" font-weight="700">ASCII</text>
      <text x="18" y="39" fill="#918f87" font-size="10">plain text first</text>

      <g transform="translate(0 70)">
        <rect width="168" height="50" rx="6" fill="#171c18" stroke="#8eabb4" stroke-opacity=".55"/>
        <text x="18" y="22" fill="#f2efe4" font-size="13" font-weight="700">Mermaid</text>
        <text x="18" y="39" fill="#918f87" font-size="10">stored rendering</text>
      </g>

      <g transform="translate(0 140)">
        <rect width="168" height="50" rx="6" fill="#171c18" stroke="#c87a61" stroke-opacity=".55"/>
        <text x="18" y="22" fill="#f2efe4" font-size="13" font-weight="700">Manual editor</text>
        <text x="18" y="39" fill="#918f87" font-size="10">editable shapes</text>
      </g>
    </g>

    <text x="32" y="332" fill="#918f87" font-size="10">Imported repository code is parsed as bounded text and never executed.</text>
    <text x="1168" y="332" text-anchor="end" fill="#918f87" font-size="10">Color marks state; generated ASCII remains monochrome.</text>
  </g>
</svg>
